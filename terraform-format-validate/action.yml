name: terraform-forat-validate
description: Format and validate Terraform module for a given directory

inputs:
  azure-credentials:
    required: true
    description: "Azure credentials in JSON format"
  directory:
    description: Directory to format and validate
    required: true
    default: '.'
  fix:
    description: Automatically fix Terraform formatting issues
    required: false
    default: 'true'
  auto-commit:
    description: Automatically commit and push formatting fixes (true, false, or auto to follow fix)
    required: false
    default: 'auto'
  auto-commit-message:
    description: Commit message used when auto-commit is enabled
    required: false
    default: 'chore(terraform): auto-format files [skip ci]'
  github-token:
    required: true
    description: "GitHub token for authentication"

runs:
  using: composite
  steps:
    - name: Extract Azure credentials
      shell: bash
      id: creds
      run: |
        echo "ARM_CLIENT_ID=$(echo '${{ inputs.azure-credentials }}' | jq -r .clientId)" >> $GITHUB_ENV
        echo "ARM_CLIENT_SECRET=$(echo '${{ inputs.azure-credentials }}' | jq -r .clientSecret)" >> $GITHUB_ENV
        echo "ARM_SUBSCRIPTION_ID=$(echo '${{ inputs.azure-credentials }}' | jq -r .subscriptionId)" >> $GITHUB_ENV
        echo "ARM_TENANT_ID=$(echo '${{ inputs.azure-credentials }}' | jq -r .tenantId)" >> $GITHUB_ENV

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.13.3

    - name: Configure Git credential URL
      shell: bash
      run: |
        git config --global url."https://${{ inputs.github-token }}@github.com/".insteadOf "https://github.com/"

    - name: Format Terraform files
      id: format
      shell: bash
      working-directory: ${{ inputs.directory }}
      run: |
        if [ "${{ inputs.fix }}" = "true" ]; then
          terraform fmt -recursive
        else
          terraform fmt -check -recursive
        fi
        
    - name: Terraform Init
      shell: bash
      working-directory: ${{ inputs.directory }}
      run: terraform init -upgrade -input=false

    - name: Validate Terraform files
      id: validate
      shell: bash
      working-directory: ${{ inputs.directory }}
      run: |
        terraform validate -no-color
        if [ $? -ne 0 ]; then
          echo "Terraform files are not valid."
          exit 1
        fi

    - name: Commit and push formatting fixes
      if: ${{ (inputs.auto-commit == 'true') || (inputs.auto-commit == 'auto' && inputs.fix == 'true') }}
      shell: bash
      working-directory: ${{ inputs.directory }}
      run: |
        if git diff --quiet && git diff --cached --quiet; then
          echo "No changes to commit."
          exit 0
        fi

        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        git add -A
        if git diff --cached --quiet; then
          echo "No staged changes to commit."
          exit 0
        fi

        git commit -m "${{ inputs.auto-commit-message }}"

        BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME:-$(git rev-parse --abbrev-ref HEAD)}}"
        if [ "$BRANCH" = "HEAD" ] || [ -z "$BRANCH" ]; then
          echo "Could not determine a valid branch name for push."
          exit 1
        fi

        git push origin "HEAD:${BRANCH}"
